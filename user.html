<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dados do Usuário - Google Login</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 40px;
            max-width: 500px;
            width: 100%;
            text-align: center;
        }

        .spinner {
            display: inline-block;
            width: 40px;
            height: 40px;
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        h1 {
            color: #333;
            margin-bottom: 10px;
            font-size: 24px;
        }

        .subtitle {
            color: #666;
            margin-bottom: 30px;
            font-size: 14px;
        }

        .user-card {
            background: #f5f5f5;
            border-radius: 8px;
            padding: 20px;
            margin-top: 20px;
            text-align: left;
        }

        .user-card img {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            display: block;
            margin: 0 auto 15px;
            border: 3px solid #667eea;
        }

        .user-info {
            margin: 15px 0;
            padding: 10px;
            background: white;
            border-radius: 6px;
        }

        .user-info p {
            margin: 8px 0;
            font-size: 14px;
            color: #555;
        }

        .user-info strong {
            color: #333;
            display: inline-block;
            min-width: 100px;
        }

        .greeting {
            font-size: 32px;
            margin: 20px 0;
        }

        .button-group {
            margin-top: 20px;
            display: flex;
            gap: 10px;
            justify-content: center;
        }

        button {
            padding: 10px 20px;
            border: none;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-back {
            background: #667eea;
            color: white;
            flex: 1;
        }

        .btn-back:hover {
            background: #5568d3;
            transform: translateY(-2px);
        }

        .error {
            background: #fef2f2;
            border: 2px solid #ef4444;
            border-radius: 8px;
            padding: 20px;
            color: #ef4444;
        }

        .error h2 {
            margin-bottom: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div id="loading">
            <div class="spinner"></div>
            <h1>Carregando Dados...</h1>
            <p class="subtitle">Aguarde enquanto obtemos suas informações</p>
        </div>

        <div id="result"></div>
    </div>

    <script>
        async function loadUserData() {
            const loadingDiv = document.getElementById('loading');
            const resultDiv = document.getElementById('result');

            try {
                // Obter o código do localStorage
                const code = localStorage.getItem('googleAuthCode');
                
                if (!code) {
                    throw new Error('Código de autorização não encontrado. Faça login novamente.');
                }

                // Chamar o backend para trocar código por dados do usuário
                const response = await fetch('/api/auth', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ code }),
                });

                if (!response.ok) {
                    const error = await response.json();
                    throw new Error(error.error || 'Falha ao obter dados');
                }

                const data = await response.json();
                const userData = data.user;

                // Mostrar dados do usuário
                loadingDiv.style.display = 'none';
                resultDiv.innerHTML = `
                    <h1>✅ Bem-vindo, ${userData.name}!</h1>
                    <div class="greeting">👋</div>
                    
                    <div class="user-card">
                        ${userData.picture ? `<img src="${userData.picture}" alt="Foto de perfil">` : ''}
                        <div class="user-info">
                            <p><strong>Nome:</strong> ${userData.name}</p>
                            <p><strong>Email:</strong> ${userData.email}</p>
                            <p><strong>ID Google:</strong> ${userData.id}</p>
                        </div>
                    </div>

                    <div class="button-group">
                        <button class="btn-back" onclick="window.location.href='index.html'">← Voltar</button>
                    </div>
                `;
                resultDiv.style.display = 'block';

            } catch (err) {
                console.error('Erro:', err);
                loadingDiv.style.display = 'none';
                resultDiv.className = 'error';
                resultDiv.innerHTML = `
                    <h2>❌ Erro</h2>
                    <p>${err.message}</p>
                    <div class="button-group">
                        <button class="btn-back" onclick="window.location.href='index.html'">← Voltar</button>
                    </div>
                `;
                resultDiv.style.display = 'block';
            }
        }

        // Carregar dados quando a página abrir
        window.addEventListener('DOMContentLoaded', loadUserData);
    </script>
</body>
</html>
