<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Google Login - Callback</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 40px;
            max-width: 600px;
            width: 100%;
            text-align: center;
        }

        .spinner {
            display: inline-block;
            width: 40px;
            height: 40px;
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        h1 {
            color: #333;
            margin-bottom: 10px;
            font-size: 24px;
        }

        .subtitle {
            color: #666;
            margin-bottom: 30px;
            font-size: 14px;
        }

        .result {
            background: #f0fdf4;
            border: 2px solid #22c55e;
            border-radius: 8px;
            padding: 20px;
            margin-top: 20px;
            display: none;
        }

        .result.error {
            background: #fef2f2;
            border-color: #ef4444;
        }

        .result h2 {
            margin-bottom: 15px;
            font-size: 20px;
        }

        .result.success h2 {
            color: #22c55e;
        }

        .result.error h2 {
            color: #ef4444;
        }

        .user-info {
            background: #f5f5f5;
            border-radius: 8px;
            padding: 15px;
            margin-top: 15px;
            text-align: left;
        }

        .user-info p {
            margin: 8px 0;
            font-size: 14px;
            color: #555;
        }

        .user-info strong {
            color: #333;
            display: inline-block;
            min-width: 100px;
        }

        .greeting {
            font-size: 32px;
            margin: 20px 0;
        }

        .button-group {
            margin-top: 20px;
            display: flex;
            gap: 10px;
            justify-content: center;
        }

        button {
            padding: 10px 20px;
            border: none;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-back {
            background: #667eea;
            color: white;
        }

        .btn-back:hover {
            background: #5568d3;
            transform: translateY(-2px);
        }

        .btn-copy {
            background: #4285f4;
            color: white;
        }

        .btn-copy:hover {
            background: #357ae8;
            transform: translateY(-2px);
        }

        .code-box {
            background: #1f2937;
            color: #10b981;
            padding: 15px;
            border-radius: 6px;
            font-family: 'Courier New', monospace;
            font-size: 12px;
            word-break: break-all;
            margin-top: 10px;
            text-align: left;
            max-height: 150px;
            overflow-y: auto;
        }

        .copy-feedback {
            display: none;
            color: #22c55e;
            font-size: 12px;
            margin-top: 5px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div id="loading">
            <div class="spinner"></div>
            <h1>Processando Login...</h1>
            <p class="subtitle">Aguarde enquanto verificamos suas credenciais</p>
        </div>

        <div class="result" id="result"></div>
    </div>

    <script>
        async function processCallback() {
            const params = new URLSearchParams(window.location.search);
            const code = params.get('code');
            const error = params.get('error');
            const errorDescription = params.get('error_description');

            const loadingDiv = document.getElementById('loading');
            const resultDiv = document.getElementById('result');

            if (error) {
                loadingDiv.style.display = 'none';
                resultDiv.className = 'result error';
                resultDiv.innerHTML = `
                    <h2>❌ Erro na Autenticação</h2>
                    <p><strong>Erro:</strong> ${error}</p>
                    <p><strong>Descrição:</strong> ${errorDescription || 'Sem descrição'}</p>
                    <div class="button-group">
                        <button class="btn-back" onclick="window.location.href='index.html'">← Voltar</button>
                    </div>
                `;
                resultDiv.style.display = 'block';
                return;
            }

            if (!code) {
                loadingDiv.style.display = 'none';
                resultDiv.className = 'result error';
                resultDiv.innerHTML = `
                    <h2>❌ Código não recebido</h2>
                    <p>Nenhum código de autorização foi retornado pelo Google.</p>
                    <div class="button-group">
                        <button class="btn-back" onclick="window.location.href='index.html'">← Voltar</button>
                    </div>
                `;
                resultDiv.style.display = 'block';
                return;
            }

            // Obter dados do usuário usando o código
            try {
                const clientId = localStorage.getItem('googleClientId');
                const redirectUri = localStorage.getItem('googleRedirectUri');
                const clientSecret = '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'; // Em produção, isso deve vir do backend!

                // Trocar código por token
                const tokenResponse = await fetch('https://oauth2.googleapis.com/token', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                    body: new URLSearchParams({
                        code,
                        client_id: clientId,
                        client_secret: clientSecret,
                        redirect_uri: redirectUri,
                        grant_type: 'authorization_code',
                    }),
                });

                if (!tokenResponse.ok) {
                    throw new Error('Falha ao obter token');
                }

                const tokenData = await tokenResponse.json();
                const accessToken = tokenData.access_token;

                // Obter informações do usuário
                const userResponse = await fetch('https://www.googleapis.com/oauth2/v2/userinfo', {
                    headers: { Authorization: `Bearer ${accessToken}` },
                });

                if (!userResponse.ok) {
                    throw new Error('Falha ao obter dados do usuário');
                }

                const userData = await userResponse.json();

                // Mostrar sucesso com dados do usuário
                setTimeout(() => {
                    loadingDiv.style.display = 'none';
                    resultDiv.className = 'result success';
                    resultDiv.innerHTML = `
                        <h2>✅ Bem-vindo, ${userData.name}!</h2>
                        <div class="greeting">👋</div>
                        
                        <div class="user-info">
                            <p><strong>Nome:</strong> ${userData.name}</p>
                            <p><strong>Email:</strong> ${userData.email}</p>
                            <p><strong>ID Google:</strong> ${userData.id}</p>
                            <p><strong>Foto:</strong> <img src="${userData.picture}" style="width: 50px; height: 50px; border-radius: 50%; margin-top: 5px;"></p>
                        </div>

                        <p style="margin-top: 15px; font-size: 12px; color: #666;">
                            <strong>Código de Autorização:</strong>
                        </p>
                        <div class="code-box" id="codeBox">${code}</div>
                        <div class="copy-feedback" id="copyFeedback">✓ Copiado!</div>

                        <div class="button-group">
                            <button class="btn-copy" onclick="copyCode()">📋 Copiar Código</button>
                            <button class="btn-back" onclick="window.location.href='index.html'">← Voltar</button>
                        </div>
                    `;
                    resultDiv.style.display = 'block';
                }, 1500);
            } catch (err) {
                console.error('Erro:', err);
                loadingDiv.style.display = 'none';
                resultDiv.className = 'result error';
                resultDiv.innerHTML = `
                    <h2>❌ Erro ao Processar</h2>
                    <p>${err.message}</p>
                    <p style="font-size: 12px; color: #666; margin-top: 10px;">
                        <strong>Nota:</strong> O Client Secret não pode ser exposto no frontend. 
                        Use um backend para trocar o código por token de forma segura.
                    </p>
                    <div class="button-group">
                        <button class="btn-back" onclick="window.location.href='index.html'">← Voltar</button>
                    </div>
                `;
                resultDiv.style.display = 'block';
            }
        }

        function copyCode() {
            const codeBox = document.getElementById('codeBox');
            const feedback = document.getElementById('copyFeedback');
            
            navigator.clipboard.writeText(codeBox.textContent).then(() => {
                feedback.style.display = 'block';
                setTimeout(() => {
                    feedback.style.display = 'none';
                }, 2000);
            });
        }

        // Processar callback quando a página carregar
        window.addEventListener('DOMContentLoaded', processCallback);
    </script>
</body>
</html>
