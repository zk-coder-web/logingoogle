<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Google Login - Callback</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 40px;
            max-width: 600px;
            width: 100%;
            text-align: center;
        }

        .spinner {
            display: inline-block;
            width: 40px;
            height: 40px;
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        h1 {
            color: #333;
            margin-bottom: 10px;
            font-size: 24px;
        }

        .subtitle {
            color: #666;
            margin-bottom: 30px;
            font-size: 14px;
        }

        .result {
            background: #f0fdf4;
            border: 2px solid #22c55e;
            border-radius: 8px;
            padding: 20px;
            margin-top: 20px;
            display: none;
        }

        .result.error {
            background: #fef2f2;
            border-color: #ef4444;
        }

        .result h2 {
            margin-bottom: 15px;
            font-size: 20px;
        }

        .result.success h2 {
            color: #22c55e;
        }

        .result.error h2 {
            color: #ef4444;
        }

        .user-info {
            background: #f5f5f5;
            border-radius: 8px;
            padding: 15px;
            margin-top: 15px;
            text-align: left;
        }

        .user-info p {
            margin: 8px 0;
            font-size: 14px;
            color: #555;
        }

        .user-info strong {
            color: #333;
            display: inline-block;
            min-width: 100px;
        }

        .greeting {
            font-size: 32px;
            margin: 20px 0;
        }

        .button-group {
            margin-top: 20px;
            display: flex;
            gap: 10px;
            justify-content: center;
        }

        button {
            padding: 10px 20px;
            border: none;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-back {
            background: #667eea;
            color: white;
        }

        .btn-back:hover {
            background: #5568d3;
            transform: translateY(-2px);
        }

        .btn-copy {
            background: #4285f4;
            color: white;
        }

        .btn-copy:hover {
            background: #357ae8;
            transform: translateY(-2px);
        }

        .code-box {
            background: #1f2937;
            color: #10b981;
            padding: 15px;
            border-radius: 6px;
            font-family: 'Courier New', monospace;
            font-size: 12px;
            word-break: break-all;
            margin-top: 10px;
            text-align: left;
            max-height: 150px;
            overflow-y: auto;
        }

        .copy-feedback {
            display: none;
            color: #22c55e;
            font-size: 12px;
            margin-top: 5px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div id="loading">
            <div class="spinner"></div>
            <h1>Processando Login...</h1>
            <p class="subtitle">Aguarde enquanto verificamos suas credenciais</p>
        </div>

        <div class="result" id="result"></div>
    </div>

    <script>
        async function processCallback() {
            const params = new URLSearchParams(window.location.search);
            const code = params.get('code');
            const error = params.get('error');
            const errorDescription = params.get('error_description');

            const loadingDiv = document.getElementById('loading');
            const resultDiv = document.getElementById('result');

            if (error) {
                loadingDiv.style.display = 'none';
                resultDiv.className = 'result error';
                resultDiv.innerHTML = `
                    <h2>❌ Erro na Autenticação</h2>
                    <p><strong>Erro:</strong> ${error}</p>
                    <p><strong>Descrição:</strong> ${errorDescription || 'Sem descrição'}</p>
                    <div class="button-group">
                        <button class="btn-back" onclick="window.location.href='index.html'">← Voltar</button>
                    </div>
                `;
                resultDiv.style.display = 'block';
                return;
            }

            if (!code) {
                loadingDiv.style.display = 'none';
                resultDiv.className = 'result error';
                resultDiv.innerHTML = `
                    <h2>❌ Código não recebido</h2>
                    <p>Nenhum código de autorização foi retornado pelo Google.</p>
                    <div class="button-group">
                        <button class="btn-back" onclick="window.location.href='index.html'">← Voltar</button>
                    </div>
                `;
                resultDiv.style.display = 'block';
                return;
            }

            // Trocar código por token no backend
            try {
                const response = await fetch('/api/auth/token', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ code }),
                });

                if (!response.ok) {
                    throw new Error('Falha ao obter dados do usuário');
                }

                const data = await response.json();
                const user = data.user;

                // Mostrar sucesso com dados do usuário
                setTimeout(() => {
                    loadingDiv.style.display = 'none';
                    resultDiv.className = 'result success';
                    resultDiv.innerHTML = `
                        <h2>✅ Bem-vindo, ${user.name}!</h2>
                        <div class="greeting">👋</div>
                        
                        <div class="user-info">
                            <p><strong>Nome:</strong> ${user.name}</p>
                            <p><strong>Email:</strong> ${user.email}</p>
                            <p><strong>ID Google:</strong> ${user.id}</p>
                            ${user.picture ? `<p><strong>Foto:</strong><br><img src="${user.picture}" style="width: 80px; height: 80px; border-radius: 50%; margin-top: 10px;"></p>` : ''}
                        </div>

                        <div class="button-group">
                            <button class="btn-back" onclick="window.location.href='index.html'">← Voltar</button>
                        </div>
                    `;
                    resultDiv.style.display = 'block';
                }, 1500);
            } catch (err) {
                console.error('Erro:', err);
                loadingDiv.style.display = 'none';
                resultDiv.className = 'result error';
                resultDiv.innerHTML = `
                    <h2>❌ Erro ao Processar</h2>
                    <p>${err.message}</p>
                    <p style="font-size: 12px; color: #666; margin-top: 10px;">
                        Certifique-se de que o servidor está rodando em http://localhost:3000
                    </p>
                    <div class="button-group">
                        <button class="btn-back" onclick="window.location.href='index.html'">← Voltar</button>
                    </div>
                `;
                resultDiv.style.display = 'block';
            }
        }

        // Processar callback quando a página carregar
        window.addEventListener('DOMContentLoaded', processCallback);
    </script>
</body>
</html>
