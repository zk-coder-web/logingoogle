<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Google Login Test</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 40px;
            max-width: 500px;
            width: 100%;
        }

        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 10px;
            font-size: 28px;
        }

        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
            font-size: 14px;
        }

        .config-section {
            background: #f5f5f5;
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 20px;
        }

        .config-section h2 {
            font-size: 16px;
            color: #333;
            margin-bottom: 15px;
            border-bottom: 2px solid #667eea;
            padding-bottom: 10px;
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: #555;
            margin-bottom: 5px;
        }

        input {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 14px;
            transition: border-color 0.3s;
        }

        input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .button-group {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        button {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-save {
            background: #667eea;
            color: white;
        }

        .btn-save:hover {
            background: #5568d3;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .btn-login {
            background: #4285f4;
            color: white;
            width: 100%;
            padding: 14px;
            font-size: 16px;
            margin-top: 10px;
        }

        .btn-login:hover {
            background: #357ae8;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(66, 133, 244, 0.4);
        }

        .btn-login:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
        }

        .result {
            background: #f0f9ff;
            border: 2px solid #667eea;
            border-radius: 8px;
            padding: 20px;
            margin-top: 20px;
            display: none;
        }

        .result.success {
            background: #f0fdf4;
            border-color: #22c55e;
        }

        .result.error {
            background: #fef2f2;
            border-color: #ef4444;
        }

        .result h3 {
            margin-bottom: 10px;
            font-size: 16px;
        }

        .result.success h3 {
            color: #22c55e;
        }

        .result.error h3 {
            color: #ef4444;
        }

        .result p {
            color: #555;
            font-size: 14px;
            line-height: 1.6;
            word-break: break-all;
        }

        .result strong {
            color: #333;
        }

        .info-box {
            background: #fef3c7;
            border-left: 4px solid #f59e0b;
            padding: 12px;
            border-radius: 4px;
            font-size: 13px;
            color: #92400e;
            margin-top: 15px;
        }

        .loading {
            display: none;
            text-align: center;
            color: #667eea;
            font-size: 14px;
        }

        .spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid #f3f3f3;
            border-top: 2px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-right: 8px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔐 Google Login Test</h1>
        <p class="subtitle">Mini sistema para testar autenticação com Google</p>

        <div class="config-section">
            <h2>⚙️ Configuração</h2>
            
            <div class="form-group">
                <label for="clientId">Google Client ID:</label>
                <input 
                    type="text" 
                    id="clientId" 
                    placeholder="883498714141-u9drnfttupbn50ahkkavs9g29t0g3ijh.apps.googleusercontent.com"
                    value="883498714141-u9drnfttupbn50ahkkavs9g29t0g3ijh.apps.googleusercontent.com"
                >
            </div>

            <div class="form-group">
                <label for="redirectUri">Redirect URI:</label>
                <input 
                    type="text" 
                    id="redirectUri" 
                    placeholder="https://seu-projeto.vercel.app/callback.html"
                    value="https://seu-projeto.vercel.app/callback.html"
                >
            </div>

            <div class="button-group">
                <button class="btn-save" onclick="saveConfig()">💾 Salvar Config</button>
            </div>

            <div class="info-box">
                ℹ️ As configurações são salvas no localStorage do navegador
            </div>
        </div>

        <button class="btn-login" onclick="loginWithGoogle()">
            🔵 Login com Google
        </button>

        <div class="loading" id="loading">
            <span class="spinner"></span>
            Redirecionando para Google...
        </div>

        <div class="result" id="result"></div>
    </div>

    <script>
        // Carregar configurações salvas
        window.addEventListener('DOMContentLoaded', () => {
            const savedClientId = localStorage.getItem('googleClientId');
            const savedRedirectUri = localStorage.getItem('googleRedirectUri');
            
            if (savedClientId) {
                document.getElementById('clientId').value = savedClientId;
            }
            if (savedRedirectUri) {
                document.getElementById('redirectUri').value = savedRedirectUri;
            }

            // Verificar se voltou do callback
            checkCallback();
        });

        function saveConfig() {
            const clientId = document.getElementById('clientId').value;
            const redirectUri = document.getElementById('redirectUri').value;

            if (!clientId || !redirectUri) {
                showResult('error', 'Erro', 'Preencha todos os campos!');
                return;
            }

            localStorage.setItem('googleClientId', clientId);
            localStorage.setItem('googleRedirectUri', redirectUri);
            showResult('success', 'Sucesso', 'Configurações salvas com sucesso!');
        }

        function loginWithGoogle() {
            const clientId = document.getElementById('clientId').value;
            const redirectUri = document.getElementById('redirectUri').value;

            if (!clientId || !redirectUri) {
                showResult('error', 'Erro', 'Configure o Client ID e Redirect URI primeiro!');
                return;
            }

            document.getElementById('loading').style.display = 'block';

            const params = new URLSearchParams({
                client_id: clientId,
                redirect_uri: redirectUri,
                response_type: 'code',
                scope: 'openid email profile',
                access_type: 'online',
                prompt: 'select_account',
            });

            window.location.href = `https://accounts.google.com/o/oauth2/v2/auth?${params.toString()}`;
        }

        function checkCallback() {
            const params = new URLSearchParams(window.location.search);
            const code = params.get('code');
            const error = params.get('error');

            if (error) {
                showResult('error', 'Erro de Autenticação', `Erro: ${error}`);
                return;
            }

            if (code) {
                showResult('success', 'Código Recebido!', `
                    <strong>Authorization Code:</strong><br>
                    ${code}<br><br>
                    <strong>Próximo passo:</strong> Trocar este código por um token de acesso no seu backend.
                `);
            }
        }

        function showResult(type, title, message) {
            const resultDiv = document.getElementById('result');
            resultDiv.className = `result ${type}`;
            resultDiv.innerHTML = `
                <h3>${title}</h3>
                <p>${message}</p>
            `;
            resultDiv.style.display = 'block';
            document.getElementById('loading').style.display = 'none';
        }
    </script>
</body>
</html>
